
services:

  nginx:
    image: nginx
    ports:
      - 80:80
    volumes:
      - tmp_vol:/tmp:z
      - ./Nginx/dev.conf.d:/etc/nginx/conf.d:z
      - ./Nginx/static_pages:/usr/share/nginx/static_pages:z
      - ./esim-cloud-backend/static:/usr/share/nginx/django_static:z
      - ./esim-cloud-backend/file_storage:/usr/share/nginx/django_file_storage:z
      - ./esim-cloud-backend/kicad-symbols/:/usr/share/nginx/kicad-libs:z
    depends_on:
      - django
      - eda-frontend
      - arduino-frontend

  eda-frontend:
    image: "docker.pkg.github.com/frg-fossee/esim-cloud/eda-frontend:dev"
    build: ./eda-frontend/
    command: >
      sh -c "npm install &&
             npm start"
    ports:
      - "3000:3000"
    volumes:
      - ./eda-frontend:/code:z
    environment:
      - NODE_ENV=development
      - "PUBLIC_URL=${EDA_PUBLIC_URL}"
    stdin_open: true
    depends_on:
      - django
      - celery
      - redis
      - db

  arduino-frontend:
    image: "docker.pkg.github.com/frg-fossee/esim-cloud/arduino-frontend:dev"
    build: ./ArduinoFrontend/
    command: >
      sh -c "npm install &&
             npm start"

    ports:
      - "4200:4200"

    volumes:
      - ./ArduinoFrontend:/code:z
    environment:
      - NODE_ENV=development
    depends_on:
      - django
      - celery
      - redis
      - db

  django:
    image: "docker.pkg.github.com/frg-fossee/esim-cloud/django:dev"
    build: ./esim-cloud-backend/
    command: "python3 manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./esim-cloud-backend:/code:z
      - run_vol:/var/run
      - cache_vol:/var/cache
      - tmp_vol:/tmp
    depends_on:
      - redis
      - db
      - celery

    env_file:
      - .env

    links:
      - "redis:redis_cache"
      - "db:mysql"

  celery:
    image: "docker.pkg.github.com/frg-fossee/esim-cloud/celery:dev"
    build: ./esim-cloud-backend/
    command: celery -A esimCloud.celery worker -l info --concurrency=1
    links:
      - "redis:redis_cache"
      - "db:postgres"
    env_file:
      - .env

    volumes:
      - ./esim-cloud-backend:/code:z
      - run_vol:/var/run
      - cache_vol:/var/cache
      - tmp_vol:/tmp
    depends_on:
      - redis
      - db

  redis:
    image: "redis:${TAG_REDIS}"
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
    volumes:
      - ./redis_data:/data:z

  # Uncomment this and Change appropriate env variables to switch to mysql
  # db:
  #   image: "mysql:${TAG_MYSQL}"
  #   command: --default-authentication-plugin=mysql_native_password
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./mysql_data:/var/lib/mysql

  db:
    image: postgres:13
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/:z
    env_file:
      - .env

volumes:
  run_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs
  cache_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs
  tmp_vol:
    driver_opts:
      type: tmpfs
      device: tmpfs
