name: Linting

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  pre-commit-job:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - uses: pre-commit/action@v3.0.1
