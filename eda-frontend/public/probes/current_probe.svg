<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Probe body: dark circle -->
  <circle cx="32" cy="32" r="28" fill="#1a1a2e" stroke="#ff9100" stroke-width="2.5"/>
  <!-- Inner glow ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#ff9100" stroke-width="1" opacity="0.4"/>
  <!-- A label -->
  <text x="32" y="40" text-anchor="middle" font-family="monospace, sans-serif" font-size="24" font-weight="bold" fill="#ff9100">A</text>
  <!-- Current direction arrow at bottom -->
  <line x1="32" y1="60" x2="32" y2="70" stroke="#ff9100" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow head pointing down -->
  <polygon points="28,67 36,67 32,72" fill="#ff9100"/>
</svg>
