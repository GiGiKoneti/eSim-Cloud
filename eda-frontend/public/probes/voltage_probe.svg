<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Probe body: dark circle -->
  <circle cx="32" cy="32" r="28" fill="#1a1a2e" stroke="#00e676" stroke-width="2.5"/>
  <!-- Inner glow ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#00e676" stroke-width="1" opacity="0.4"/>
  <!-- V label -->
  <text x="32" y="40" text-anchor="middle" font-family="monospace, sans-serif" font-size="24" font-weight="bold" fill="#00e676">V</text>
  <!-- Probe tip line at bottom -->
  <line x1="32" y1="60" x2="32" y2="70" stroke="#00e676" stroke-width="2.5" stroke-linecap="round"/>
</svg>
